<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jane Doe - Web Developer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            direction: ltr;
        }

        .left-section {
            width: 35%;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            position: relative;
            order: 1;
        }

        .logo {
            font-family: 'Brush Script MT', cursive;
            font-size: 42px;
            font-weight: 300;
            font-style: italic;
        }

        .profile-image {
            position: absolute;
            left: -150px;
            top: 50%;
            transform: translateY(-50%);
            width: 350px;
            height: 350px;
            border-radius: 50%;
            overflow: hidden;
            border: 15px solid #000;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
        }

        .social-icons {
            display: flex;
            gap: 25px;
        }

        .social-icons a {
            color: #fff;
            font-size: 32px;
            transition: transform 0.3s ease;
        }

        .social-icons a:hover {
            transform: scale(1.2);
        }

        .right-section {
            width: 65%;
            background-color: #e5e5e5;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .menu-icon {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 32px;
            cursor: pointer;
            color: #333;
        }

        .menu-icon span {
            display: block;
            width: 35px;
            height: 3px;
            background-color: #333;
            margin: 7px 0;
            transition: 0.3s;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .main-title {
            font-size: 72px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 30px;
            line-height: 1.1;
        }

        .description {
            font-size: 17px;
            line-height: 1.8;
            color: #666;
            margin-bottom: 50px;
            max-width: 550px;
        }

        .buttons {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 18px 45px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid #000;
            color: #000;
        }

        .btn-outline:hover {
            background-color: #000;
            color: #fff;
        }

        .btn-solid {
            background-color: #000;
            color: #fff;
            border: 2px solid #000;
        }

        .btn-solid:hover {
            background-color: #333;
            border-color: #333;
        }

        @media (max-width: 1024px) {
            .left-section {
                width: 40%;
            }
            .right-section {
                width: 60%;
            }
            .profile-image {
                width: 300px;
                height: 300px;
                left: -120px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .left-section {
                width: 100%;
                height: auto;
                padding: 30px;
            }
            .right-section {
                width: 100%;
                padding: 40px 30px;
            }
            .profile-image {
                position: static;
                transform: none;
                margin: 30px auto;
                width: 250px;
                height: 250px;
            }
            .main-title {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="left-section">
        <div class="logo">Jane Doe</div>
        <div class="profile-image">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=500&h=500&fit=crop" alt="Jane Doe">
        </div>
        <div class="social-icons">
            <a href="#" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="#" title="GitHub"><i class="fab fa-github"></i></a>
            <a href="#" title="Twitter"><i class="fab fa-twitter"></i></a>
        </div>
    </div>

    <div class="right-section">
        <div class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="subtitle">Web Developer</div>
        <h1 class="main-title">Jane Doe</h1>
        <p class="description">
            There wasn't a bird in the sky, but that was not what caught her attention. It was the clouds. The deep green that isn't the color of clouds, but came with these. She knew what was coming and she hoped she was prepared.
        </p>
        <div class="buttons">
            <a href="#" class="btn btn-outline">Download CV</a>
            <a href="#" class="btn btn-solid">Contact</a>
        </div>
    </div>
</body>
</html>
